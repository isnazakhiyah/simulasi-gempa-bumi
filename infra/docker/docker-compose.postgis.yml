services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: simulasi-gempa-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: simulasi_gempa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data:
